name: CI

on: [push, pull_request]

env:
  PY_COLORS: 1
  COLUMNS: 110

jobs:
  test:
    name: Test
    runs-on: ${{ matrix.os }}-latest
    timeout-minutes: 2
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu, windows, macos]
        python-version: ["3.14"]  # "3.8", "3.9", "3.10", "3.11", "3.12", "3.13",
    steps:
      - name: Checkout repository
        uses: actions/checkout@v7.0.0
      - name: Install uv
        uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0
        with:
          enable-cache: false
      - name: Run tests
        run: uv run --python ${{ matrix.python-version }} --no-dev --group test -- pytest tests/test_auth.py tests/test_balancer.py tests/test_cli.py
